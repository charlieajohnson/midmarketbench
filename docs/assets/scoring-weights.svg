<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-label="MidMarketBench scoring weights">
  <defs>
    <style>
      .title {
        font:
          800 34px Inter,
          ui-sans-serif,
          system-ui,
          sans-serif;
        fill: #17201d;
      }
      .sub {
        font:
          500 18px Inter,
          ui-sans-serif,
          system-ui,
          sans-serif;
        fill: #52615a;
      }
      .label {
        font:
          700 16px Inter,
          ui-sans-serif,
          system-ui,
          sans-serif;
        fill: #17201d;
      }
      .value {
        font:
          800 16px Inter,
          ui-sans-serif,
          system-ui,
          sans-serif;
        fill: #17201d;
      }
      .axis {
        stroke: #d7ded9;
        stroke-width: 1;
      }
    </style>
  </defs>
  <rect width="1200" height="460" rx="28" fill="#fbfcf9" />
  <text class="title" x="54" y="64">Scoring weights</text>
  <text class="sub" x="54" y="96">
    The benchmark favours investment judgement, evidence discipline and risk discovery.
  </text>
  <g transform="translate(54 140)">
    <line class="axis" x1="250" x2="1080" y1="0" y2="0" />
    <line class="axis" x1="250" x2="1080" y1="252" y2="252" />
    <g transform="translate(0 0)">
      <text class="label" x="0" y="20">Commercial judgement</text>
      <rect x="250" y="0" width="760" height="28" rx="8" fill="#6d825f" />
      <text class="value" x="1030" y="20">20%</text>
    </g>
    <g transform="translate(0 36)">
      <text class="label" x="0" y="20">Grounding</text>
      <rect x="250" y="0" width="570" height="28" rx="8" fill="#75858b" />
      <text class="value" x="840" y="20">15%</text>
    </g>
    <g transform="translate(0 72)">
      <text class="label" x="0" y="20">Scepticism</text>
      <rect x="250" y="0" width="570" height="28" rx="8" fill="#75858b" />
      <text class="value" x="840" y="20">15%</text>
    </g>
    <g transform="translate(0 108)">
      <text class="label" x="0" y="20">Numerical sanity</text>
      <rect x="250" y="0" width="570" height="28" rx="8" fill="#75858b" />
      <text class="value" x="840" y="20">15%</text>
    </g>
    <g transform="translate(0 144)">
      <text class="label" x="0" y="20">Risk discovery</text>
      <rect x="250" y="0" width="570" height="28" rx="8" fill="#75858b" />
      <text class="value" x="840" y="20">15%</text>
    </g>
    <g transform="translate(0 180)">
      <text class="label" x="0" y="20">Question generation</text>
      <rect x="250" y="0" width="380" height="28" rx="8" fill="#b27b4d" />
      <text class="value" x="650" y="20">10%</text>
    </g>
    <g transform="translate(0 216)">
      <text class="label" x="0" y="20">European context</text>
      <rect x="250" y="0" width="190" height="28" rx="8" fill="#d2b083" />
      <text class="value" x="460" y="20">5%</text>
    </g>
    <g transform="translate(0 252)">
      <text class="label" x="0" y="20">Output usefulness</text>
      <rect x="250" y="0" width="190" height="28" rx="8" fill="#d2b083" />
      <text class="value" x="460" y="20">5%</text>
    </g>
  </g>
</svg>
