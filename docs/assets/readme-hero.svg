<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title description">
  <title id="title">MidMarketBench observed benchmark overview</title>
  <desc id="description">An institutional chromatic overview of the 18 July 2026 OpenRouter mini benchmark, led by Kimi K3 with a provisional tie.</desc>
  <defs>
    <clipPath id="chromatic-field">
      <rect x="674" y="74" width="526" height="486" />
    </clipPath>
    <style>
      .brand {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 25px;
        font-weight: 700;
        letter-spacing: -0.035em;
      }
      .run {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 13px;
        font-weight: 650;
        letter-spacing: 0.12em;
      }
      .kicker {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.11em;
      }
      .display {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 50px;
        font-weight: 720;
        letter-spacing: -0.045em;
      }
      .body {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 19px;
        font-weight: 500;
      }
      .fact-label {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.11em;
      }
      .fact-value {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 680;
      }
      .ledger-title {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 720;
        letter-spacing: 0.06em;
      }
      .ledger-copy {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 610;
      }
      .ledger-score {
        font-family: Menlo, Consolas, monospace;
        font-size: 20px;
        font-weight: 760;
      }
      .ledger-small {
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.025em;
      }
    </style>
  </defs>

  <rect width="1200" height="560" rx="8" fill="#F4F2EC" />

  <g aria-label="Header">
    <path d="M8 0h1184a8 8 0 0 1 8 8v66H0V8a8 8 0 0 1 8-8Z" fill="#14130F" />
    <text class="brand" x="54" y="47" fill="#F4F2EC">MidMarketBench</text>
    <circle cx="925" cy="37" r="5" fill="#F2C105" />
    <text class="run" x="942" y="42" fill="#F4F2EC">OBSERVED · 18 JUL 2026</text>
  </g>

  <g aria-label="Benchmark summary" transform="translate(54 125)">
    <text class="kicker" x="0" y="0" fill="#14130F">EUROPEAN B2B SOFTWARE · OPENROUTER MINI BENCHMARK</text>
    <text class="display" x="0" y="77" fill="#14130F">Investment judgement,</text>
    <text class="display" x="0" y="139" fill="#14130F">benchmarked.</text>
    <rect x="0" y="180" width="78" height="5" fill="#E52F45" />
    <text class="body" x="0" y="226" fill="#14130F">Can a frontier model turn a sparse diligence packet</text>
    <text class="body" x="0" y="253" fill="#14130F">into work an investment team can use?</text>

    <g transform="translate(0 300)" aria-label="Run facts">
      <line x1="0" x2="590" y1="0" y2="0" stroke="#14130F" stroke-width="1.5" />
      <line x1="0" x2="590" y1="76" y2="76" stroke="#14130F" stroke-width="1.5" />
      <line x1="147.5" x2="147.5" y1="0" y2="76" stroke="#14130F" />
      <line x1="295" x2="295" y1="0" y2="76" stroke="#14130F" />
      <line x1="442.5" x2="442.5" y1="0" y2="76" stroke="#14130F" />

      <text class="fact-label" x="0" y="25" fill="#6B6963">CASE</text>
      <text class="fact-value" x="0" y="53" fill="#14130F">Norwyn</text>

      <text class="fact-label" x="168" y="25" fill="#6B6963">TASKS</text>
      <text class="fact-value" x="168" y="53" fill="#14130F">4 closed-book</text>

      <text class="fact-label" x="315" y="25" fill="#6B6963">ROSTER</text>
      <text class="fact-value" x="315" y="53" fill="#14130F">9 requested</text>

      <text class="fact-label" x="463" y="25" fill="#6B6963">RANKED</text>
      <text class="fact-value" x="463" y="53" fill="#14130F">8 models</text>
    </g>
  </g>

  <g aria-label="Chromatic field" clip-path="url(#chromatic-field)">
    <rect x="674" y="74" width="526" height="486" fill="#E52F45" />
    <circle cx="1124" cy="122" r="183" fill="#F2C105" />
    <rect x="674" y="265" width="269" height="295" fill="#F89A15" />
    <rect x="943" y="346" width="257" height="214" fill="#EB5D4B" />
    <circle cx="928" cy="554" r="95" fill="#F2C105" />
  </g>

  <g aria-label="Observed leaderboard" transform="translate(724 118)">
    <rect width="426" height="394" rx="5" fill="#F4F2EC" stroke="#14130F" stroke-width="2" />
    <text class="ledger-title" x="26" y="37" fill="#14130F">OBSERVED LEADERBOARD</text>
    <text class="ledger-small" x="400" y="37" text-anchor="end" fill="#6B6963">v0.4-mini</text>
    <line x1="26" x2="400" y1="58" y2="58" stroke="#14130F" stroke-width="1.5" />

    <text class="ledger-small" x="26" y="82" fill="#6B6963">RANK</text>
    <text class="ledger-small" x="77" y="82" fill="#6B6963">MODEL</text>
    <text class="ledger-small" x="400" y="82" text-anchor="end" fill="#6B6963">OVERALL</text>

    <g transform="translate(0 95)">
      <rect x="1" width="424" height="55" fill="#F2C105" />
      <text class="ledger-score" x="26" y="35" fill="#14130F">01</text>
      <text class="ledger-copy" x="77" y="35" fill="#14130F">Kimi K3</text>
      <text class="ledger-score" x="400" y="35" text-anchor="end" fill="#14130F">96.28</text>
    </g>
    <g transform="translate(0 150)">
      <line x1="26" x2="400" y1="55" y2="55" stroke="#B9B6AF" />
      <text class="ledger-score" x="26" y="35" fill="#14130F">02</text>
      <text class="ledger-copy" x="77" y="35" fill="#14130F">Grok 4.5</text>
      <text class="ledger-score" x="400" y="35" text-anchor="end" fill="#14130F">96.27</text>
    </g>
    <g transform="translate(0 205)">
      <line x1="26" x2="400" y1="55" y2="55" stroke="#B9B6AF" />
      <text class="ledger-score" x="26" y="35" fill="#14130F">03</text>
      <text class="ledger-copy" x="77" y="35" fill="#14130F">GPT-5.6 Sol</text>
      <text class="ledger-score" x="400" y="35" text-anchor="end" fill="#14130F">95.50</text>
    </g>

    <g transform="translate(26 285)">
      <rect width="374" height="1.5" fill="#14130F" />
      <text class="ledger-small" x="0" y="28" fill="#6B6963">STATUS</text>
      <text class="ledger-copy" x="0" y="52" fill="#14130F">Provisional top group</text>
      <text class="ledger-small" x="374" y="28" text-anchor="end" fill="#6B6963">SETTLED SPEND</text>
      <text class="ledger-copy" x="374" y="52" text-anchor="end" fill="#14130F">$5.315590</text>
    </g>
    <text class="ledger-small" x="26" y="374" fill="#6B6963">Two samples per completed model · directional result</text>
  </g>
</svg>
